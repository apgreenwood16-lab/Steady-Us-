<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#111}
    .slide-container{width:1280px;min-height:720px;background:#F4EEE5;display:grid;grid-template-columns:60% 40%;font-family:'Inter',sans-serif;color:#2C2A28}
    .left{min-height:720px;padding-top:132px;padding-left:92px;padding-right:68px;display:flex;flex-direction:column;gap:24px}
    .eyebrow{font-size:18px;letter-spacing:.22em;text-transform:uppercase;color:#7A8F6A;font-weight:600}
    .rule{width:120px;height:4px;background:#143C3A}
    h1{font-family:'Playfair Display',serif;font-size:70px;line-height:.96;color:#143C3A;max-width:560px}
    .subtitle{font-size:27px;line-height:1.38;max-width:520px}
    .note{margin-top:20px;font-size:18px;line-height:1.45;color:#5A554F}
    .right{min-height:720px;background:#143C3A;display:flex;align-items:center;justify-content:center}
    .art{width:360px;height:470px;position:relative}
    .c1,.c2,.c3{position:absolute;border-radius:50%}
    .c1{width:240px;height:240px;top:10px;left:100px;border:2px solid rgba(244,238,229,.4);background:rgba(244,238,229,.12)}
    .c2{width:168px;height:168px;top:170px;left:18px;background:rgba(122,143,106,.85)}
    .c3{width:190px;height:190px;top:250px;left:132px;border:2px solid rgba(244,238,229,.32);background:rgba(244,238,229,.1)}
    .text{position:absolute;left:150px;top:404px;width:180px;font-size:19px;line-height:1.4;color:#F4EEE5}
  </style>
</head>
<body>
  <div class="slide-container">
    <section class="left">
      <div class="eyebrow">SteadyUs</div>
      <div class="rule"></div>
      <h1>Short prospect deck</h1>
      <div class="subtitle">A concise overview of the Couples Budget Reset for couples who want calmer, more practical money conversations.</div>
      <div class="note">Rebuilt presentation source for repository backup</div>
    </section>
    <section class="right">
      <div class="art">
        <div class="c1"></div><div class="c2"></div><div class="c3"></div>
        <div class="text">Short overview · same warm editorial system</div>
      </div>
    </section>
  </div>
</body>
</html>
