<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; }
    .slide-container {
      width: 1280px;
      min-height: 720px;
      background: #F4EEE5;
      font-family: 'Inter', sans-serif;
      color: #2C2A28;
      display: grid;
      grid-template-columns: 58% 42%;
    }
    .left-panel {
      min-height: 720px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 26px;
      padding-top: 130px;
      padding-left: 92px;
      padding-right: 70px;
    }
    .eyebrow {
      font-size: 18px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #7A8F6A;
      font-weight: 600;
    }
    .rule {
      width: 110px;
      height: 4px;
      background: #143C3A;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      line-height: 0.95;
      color: #143C3A;
      max-width: 560px;
    }
    .subtitle {
      font-size: 28px;
      line-height: 1.35;
      max-width: 500px;
      color: #2C2A28;
    }
    .footer-note {
      margin-top: 30px;
      font-size: 18px;
      line-height: 1.4;
      color: #5A554F;
    }
    .right-panel {
      min-height: 720px;
      background: #143C3A;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .artboard {
      width: 410px;
      height: 520px;
      position: relative;
    }
    .circle-a, .circle-b, .circle-c, .circle-d {
      position: absolute;
      border-radius: 50%;
    }
    .circle-a {
      width: 270px; height: 270px; top: 16px; left: 110px;
      background: rgba(244, 238, 229, 0.14);
      border: 2px solid rgba(244, 238, 229, 0.45);
    }
    .circle-b {
      width: 175px; height: 175px; top: 180px; left: 14px;
      background: rgba(122, 143, 106, 0.82);
    }
    .circle-c {
      width: 210px; height: 210px; top: 260px; left: 150px;
      background: rgba(244, 238, 229, 0.12);
      border: 2px solid rgba(244, 238, 229, 0.35);
    }
    .circle-d {
      width: 78px; height: 78px; top: 92px; left: 46px;
      background: #F4EEE5;
      opacity: 0.92;
    }
    .line-a, .line-b {
      position: absolute;
      background: rgba(244, 238, 229, 0.55);
      transform-origin: left center;
    }
    .line-a {
      width: 220px; height: 2px; top: 135px; left: 70px; transform: rotate(28deg);
    }
    .line-b {
      width: 250px; height: 2px; top: 395px; left: 70px; transform: rotate(-22deg);
    }
    .tag {
      position: absolute;
      left: 182px;
      top: 480px;
      width: 190px;
      font-size: 20px;
      line-height: 1.35;
      color: #F4EEE5;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <section class="left-panel">
      <div class="eyebrow">SteadyUs</div>
      <div class="rule"></div>
      <h1>Couples<br>Budget Reset</h1>
      <div class="subtitle">A calm, practical financial coaching package for couples who want more clarity and less friction around money.</div>
      <div class="footer-note">Rebuilt source deck · pilot price £99</div>
    </section>
    <section class="right-panel">
      <div class="artboard">
        <div class="circle-a"></div>
        <div class="circle-b"></div>
        <div class="circle-c"></div>
        <div class="circle-d"></div>
        <div class="line-a"></div>
        <div class="line-b"></div>
        <div class="tag">Practical money clarity without jargon, shame, or another circular conversation.</div>
      </div>
    </section>
  </div>
</body>
</html>
